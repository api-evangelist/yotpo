specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Yotpo
providerId: yotpo
created: '2026-06-25'
modified: '2026-06-25'
reconciled: false
tags:
- eCommerce
- Reviews
- Loyalty
- Retention Marketing
- UGC
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Yotpo spend. Yotpo bills as a SaaS retention platform: Reviews
  and Loyalty are subscription tiers gated by monthly order volume (with free
  entry tiers), multi-product bundles are sales-led, and the discontinued SMS &
  Email products were usage-based (per message / per recipient). Costs scale
  primarily with monthly order volume and product mix rather than raw API call
  counts.
notes: >-
  Per-tier prices, order-volume thresholds, and bundle pricing are largely
  quote-based and not consistently published; verify against the Yotpo pricing
  pages during reconciliation. SMS & Email usage meters are retained for
  historical context only - those products were discontinued December 31, 2025.
sources:
- https://www.yotpo.com/pricing/
- https://www.yotpo.com/platform/reviews/
- https://www.yotpo.com/platform/loyalty-and-referrals/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Yotpo
serviceCategory: Marketing and Commerce
billingModel:
  pricingCategory: Subscription-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Yotpo
  ServiceCategory: Marketing and Commerce
  ProviderName: Yotpo
  PublisherName: Yotpo
  InvoiceIssuerName: Yotpo
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingCategory: Subscription-Based
meters:
- name: monthly_orders
  description: Monthly order volume that gates Reviews and Loyalty subscription tiers.
  unit: orders
  aggregation: sum
  dimensions:
  - account
  - product
- name: platform_subscription
  description: Recurring subscription charge for the selected product tier or bundle.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - product
- name: sms_messages
  description: SMS messages sent (legacy SMSBump usage; product discontinued 2025-12-31).
  unit: messages
  aggregation: sum
  dimensions:
  - account
- name: email_sends
  description: Email recipients sent to (legacy Email usage; product discontinued 2025-12-31).
  unit: emails
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track monthly order volume and product mix; tier costs step with order thresholds.
- name: Allocation
  description: Map each Yotpo product (Reviews, Loyalty, Subscriptions) to the team or storefront that owns it.
- name: Optimization
  description: Right-size tiers to actual order volume; consolidate products into a bundle where a quote is cheaper than separate subscriptions.
- name: Accountability
  description: Review subscription renewals and order-volume growth against budget before tier upgrades.
maintainers:
- FN: Kin Lane
