  tags:
  - UGC
  - Visual
  - Galleries
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://apidocs.yotpo.com/reference/welcome
  baseURL: https://api.yotpo.com
