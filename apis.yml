aid: yotpo
url: https://raw.githubusercontent.com/api-evangelist/yotpo/refs/heads/main/apis.yml
name: Yotpo
kind: company
description: Yotpo is an eCommerce retention marketing platform offering Reviews &
  Ratings, Loyalty & Referrals, Subscriptions, and visual UGC. Each product exposes
  a documented REST API - the UGC/Reviews and Core APIs under api.yotpo.com (app key
  plus OAuth utoken) and the Loyalty & Referrals API under loyalty.yotpo.com (program
  GUID plus API key) - so merchants can sync orders, products, and customers and drive
  reviews, points, and redemptions programmatically. Yotpo's SMS & Email (SMSBump)
  products were discontinued on December 31, 2025.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- eCommerce
- Reviews
- Loyalty
- Retention Marketing
- UGC
created: '2026-06-25'
modified: '2026-06-25'
specificationVersion: '0.19'
apis:
- aid: yotpo:yotpo-reviews-ratings-api
  name: Yotpo Reviews & Ratings API
  tags:
  - Reviews
  - Ratings
  - UGC
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://apidocs.yotpo.com/reference/welcome
  baseURL: https://api.yotpo.com
  properties:
  - url: https://apidocs.yotpo.com/reference/welcome
    type: Documentation
  - url: https://apidocs.yotpo.com/reference
    type: APIReference
  - url: openapi/yotpo-openapi.yml
    type: OpenAPI
  description: Retrieve, create, and moderate product reviews, ratings, bottom-line
    scores, and Q&A under api.yotpo.com/v1, authenticated with an app key and an OAuth
    utoken generated from the store secret.
- aid: yotpo:yotpo-loyalty-referrals-api
  name: Yotpo Loyalty & Referrals API
  tags:
  - Loyalty
