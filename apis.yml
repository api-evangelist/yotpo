    type: Documentation
  - url: https://loyaltyapi.yotpo.com/reference/authentication
    type: APIReference
  - url: openapi/yotpo-openapi.yml
    type: OpenAPI
  description: Manage loyalty customers, point balances, orders, redemptions, and
