  - Points
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://loyaltyapi.yotpo.com/reference/welcome
  baseURL: https://loyalty.yotpo.com/api/v2
  properties:
