- aid: yotpo:yotpo-sms-email-api
  name: Yotpo SMS & Email API
  tags:
  - SMS
  - Email
  - Marketing
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://apidocs.yotpo.com/reference
  baseURL: https://api.yotpo.com
  properties:
  - url: https://apidocs.yotpo.com/reference
    type: Documentation
  - url: openapi/yotpo-openapi.yml
    type: OpenAPI
  description: Legacy SMS & Email (SMSBump) marketing API for managing contacts,
    lists, and campaigns. Yotpo permanently discontinued its SMS and Email products
    on December 31, 2025; documented here for historical completeness.
